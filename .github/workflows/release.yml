name: Cross-Platform Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Aegis Binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            executable_name: aegis-linux
            asset_name: aegis-linux
          - os: windows-latest
            executable_name: aegis.exe
            asset_name: aegis-windows.exe
          - os: macos-latest
            executable_name: aegis-macos
            asset_name: aegis-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller tree-sitter tree-sitter-python litellm httpx

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name ${{ matrix.executable_name }} src/main.py

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ matrix.asset_name }}
